<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SAPIX 漢字フラッシュカード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: #FDF8F0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Back link ── */
  .back-link {
    width: 100%;
    max-width: 480px;
    margin-bottom: 6px;
  }
  .back-link a {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: #A89580;
    text-decoration: none;
    padding: 4px 0;
  }
  .back-link a:active { opacity: 0.6; }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    margin-bottom: 10px;
  }
  .header h1 { font-size: 18px; color: #4A3728; font-weight: 700; margin-bottom: 2px; }
  .header .set-name { font-size: 13px; color: #8B7355; margin-bottom: 6px; }

  /* ── Character ── */
  .char-area {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    margin-bottom: 10px;
  }
  .char-icon { width: 72px; flex-shrink: 0; }
  .char-bubble {
    background: white;
    border-radius: 16px 16px 16px 4px;
    padding: 11px 15px;
    font-size: 14px;
    color: #4A3728;
    box-shadow: 0 2px 10px rgba(74,55,40,0.12);
    flex: 1;
    font-weight: 500;
    line-height: 1.5;
    position: relative;
    transition: opacity 0.2s ease;
  }
  .char-bubble.changing { opacity: 0; }
  .char-bubble::before {
    content: '';
    position: absolute;
    left: -9px;
    bottom: 14px;
    border: 9px solid transparent;
    border-right-color: white;
    border-left: none;
    filter: drop-shadow(-2px 1px 2px rgba(74,55,40,0.08));
  }

  /* ── Progress ── */
  .progress-wrap { width: 100%; max-width: 480px; margin-bottom: 14px; }
  .progress-text { font-size: 13px; color: #8B7355; text-align: right; margin-bottom: 4px; }
  .progress-bar { width: 100%; height: 8px; background: #E8DFD3; border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7CB342, #558B2F);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* ── Card ── */
  .card-container { width: 100%; max-width: 480px; perspective: 800px; margin-bottom: 16px; }
  .card {
    width: 100%;
    min-height: 220px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 2px 12px rgba(74,55,40,0.10), 0 1px 3px rgba(74,55,40,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card-front .sentence {
    font-size: 20px;
    line-height: 1.7;
    color: #3E2C1C;
    text-align: center;
    margin-bottom: 16px;
  }
  .card-front .sentence .blank {
    display: inline-block;
    border-bottom: 3px solid #C2956B;
    min-width: 3em;
    margin: 0 2px;
    vertical-align: baseline;
  }
  .card-front .reading {
    font-size: 22px;
    color: #C2956B;
    font-weight: 600;
    background: #FFF7ED;
    padding: 6px 20px;
    border-radius: 20px;
  }
  .card-back { transform: rotateY(180deg); }
  .card-back .answer { font-size: 54px; font-weight: 700; color: #3E2C1C; margin-bottom: 6px; }
  .card-back .reading-small { font-size: 16px; color: #8B7355; margin-bottom: 4px; }
  .card-back .sentence-small { font-size: 14px; color: #A89580; text-align: center; line-height: 1.6; margin-bottom: 10px; }
  .next-due-label {
    font-size: 12px;
    color: #BBA88E;
    background: #FFF7ED;
    border-radius: 10px;
    padding: 3px 10px;
  }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 14px; width: 100%; max-width: 480px; }
  .btn {
    flex: 1;
    min-height: 52px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn:active { transform: scale(0.96); }
  .btn-again { background: #FFEBEE; color: #C62828; box-shadow: 0 2px 6px rgba(198,40,40,0.12); }
  .btn-ok    { background: #E8F5E9; color: #2E7D32; box-shadow: 0 2px 6px rgba(46,125,50,0.12); }
  .btn-flip  { background: #FFF3E0; color: #E65100; box-shadow: 0 2px 6px rgba(230,81,0,0.12); }

  /* ── Set Selection ── */
  .screen { display: none; width: 100%; max-width: 480px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  .select-char-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 16px; }
  .select-char-area svg { margin-bottom: 10px; }
  .select-greeting {
    background: white;
    border-radius: 20px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    color: #4A3728;
    box-shadow: 0 2px 10px rgba(74,55,40,0.12);
    text-align: center;
  }

  /* 今日の復習ボタン */
  .due-btn {
    width: 100%;
    padding: 16px 20px;
    background: #FFF3E0;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(230,81,0,0.12);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    transition: transform 0.1s;
    border: 2px solid #FFCC80;
  }
  .due-btn:active { transform: scale(0.98); }
  .due-btn .due-title { font-size: 16px; color: #E65100; font-weight: 700; }
  .due-btn .due-count-badge {
    background: #E65100;
    color: white;
    font-size: 14px;
    font-weight: 700;
    border-radius: 12px;
    padding: 4px 12px;
  }
  .due-btn.no-due {
    background: #F1F8E9;
    border-color: #C5E1A5;
    cursor: default;
  }
  .due-btn.no-due .due-title { color: #558B2F; }

  .set-list { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .set-item {
    width: 100%;
    padding: 16px 20px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 1px 6px rgba(74,55,40,0.08);
    cursor: pointer;
    transition: transform 0.1s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .set-item:active { transform: scale(0.98); }
  .set-item .name { font-size: 16px; color: #3E2C1C; font-weight: 600; }
  .set-item .meta { font-size: 13px; color: #8B7355; margin-top: 2px; }
  .set-item .arrow { font-size: 18px; color: #C2956B; }
  .set-item.review-set { background: #FFF8E1; }
  .set-item.review-set .name { color: #B45309; }

  /* 未復習バッジ */
  .due-badge {
    display: inline-block;
    background: #E65100;
    color: white;
    font-size: 11px;
    font-weight: 700;
    border-radius: 8px;
    padding: 1px 7px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── Complete ── */
  .complete-screen { text-align: center; padding-top: 20px; }
  .complete-char { width: 100px; margin: 0 auto 12px; }
  .complete-screen h2 { font-size: 26px; color: #2E7D32; margin-bottom: 6px; }
  .complete-screen .complete-msg-txt { font-size: 15px; color: #8B7355; margin-bottom: 8px; }
  .complete-phrase {
    font-size: 18px;
    font-weight: 600;
    color: #C2956B;
    background: white;
    border-radius: 16px;
    padding: 12px 20px;
    box-shadow: 0 2px 8px rgba(74,55,40,0.10);
    margin-bottom: 24px;
  }
  .btn-back {
    background: #FFF3E0; color: #E65100;
    padding: 14px 36px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .btn-retry {
    background: #E8F5E9; color: #2E7D32;
    padding: 14px 36px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer; margin-right: 10px;
  }
</style>
</head>

      { sentence: "____文を読む",                         reading: "ものがたり",     answer: "物語"   },
      { sentence: "座る____を探す",                       reading: "ばしょ",         answer: "場所"   },
      { sentence: "____の成り立ちを知る",                 reading: "かんじ",         answer: "漢字"   }
    ]
  }
];

// ─────────────────────────────────────────
// SM-2 アルゴリズム
// ─────────────────────────────────────────
// state: { ef, interval, rep, dueDate }
// correct: true=覚えた(q=4) / false=もう一回(q=1)
function sm2Update(state, correct) {
  var q = correct ? 4 : 1;
  if (!state) state = { ef: 2.5, interval: 0, rep: 0, dueDate: 0 };

  if (q < 3) {
    // 不正解：インターバルをリセット
    state.rep = 0;
    state.interval = 1;
  } else {
    // 正解：インターバルを伸ばす
    if      (state.rep === 0) state.interval = 1;
    else if (state.rep === 1) state.interval = 6;
    else                       state.interval = Math.round(state.interval * state.ef);
    state.rep += 1;
    // EF更新（最小1.3）
    var newEf = state.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
    state.ef = Math.max(1.3, newEf);
  }

  // 次回復習日 = 今日の00:00 + interval日
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  state.dueDate = today.getTime() + state.interval * 86400000;
  return state;
}

// ─────────────────────────────────────────
// localStorage ユーティリティ
// ─────────────────────────────────────────
var LS_PREFIX = 'sapix_fc_';

function cardId(setIdx, cardIdx) {
  return LS_PREFIX + setIdx + '_' + cardIdx;
}

function loadState(id) {
  try {
    var raw = localStorage.getItem(id);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveState(id, state) {
  try { localStorage.setItem(id, JSON.stringify(state)); } catch(e) {}
}

// ─────────────────────────────────────────
// 復習スケジュール計算
// ─────────────────────────────────────────
function isDue(id) {
  var st = loadState(id);
  if (!st) return true; // 未学習 = 今日やるべき
  return st.dueDate <= Date.now();
}

function getDueCards() {
  var result = [];
  CARD_SETS.forEach(function(set, si) {
    set.cards.forEach(function(card, ci) {
      var id = cardId(si, ci);
      if (isDue(id)) result.push({ card: card, id: id });
    });
  });
  return result;
}

function countDueForSet(si) {
  var count = 0;
  CARD_SETS[si].cards.forEach(function(_, ci) {
    if (isDue(cardId(si, ci))) count++;
  });
  return count;
}

function intervalLabel(interval) {
  if (interval === 1)  return '次回：明日';
  if (interval < 30)   return '次回：' + interval + '日後';
  var m = Math.round(interval / 30);
  return '次回：約' + m + 'ヶ月後';
}

// ─────────────────────────────────────────
// セリフパターン
// ─────────────────────────────────────────
const PHRASES = {
  question: ['これ、わかるかな〜？✨', 'さあ、挑戦だよ！💪', 'ヒントをよく見てね！', '読めるかな？🌟', 'がんばって！'],
  answer:   ['どうだった？正直に！', '覚えてた？', 'さあ、どっち？'],
  ok:       ['やったね！🎉', '完璧！✨', 'すごい！さすが！', '正解！🌟', 'ばっちり！'],
  again:    ['もう少しだよ！💪', '一緒に練習しよう！', '次は覚えようね！', '繰り返しが大事！'],
  complete: ['よくがんばったね！🌟', '全問正解！さすが！🎊', '完璧だよ！すごい！✨', '100点満点！🎉']
};

function randPhrase(type) {
  var arr = PHRASES[type];
  return arr[Math.floor(Math.random() * arr.length)];
}

function setPhrase(type) {
  var el = document.getElementById('char-bubble');
  el.classList.add('changing');
  setTimeout(function() {
    el.textContent = randPhrase(type);
    el.classList.remove('changing');
  }, 120);
}

// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
var currentSetIndex = -1; // -1 = 今日の復習モード
var deck    = [];          // カードオブジェクト
var deckIds = [];          // 対応するlocalStorageキー
var done = 0;
var totalCards = 0;
var isFlipped = false;

var $select   = document.getElementById('select-screen');
var $quiz     = document.getElementById('quiz-screen');
var $complete = document.getElementById('complete-screen');

function showScreen(el) {
  [$select, $quiz, $complete].forEach(function(s) { s.classList.remove('active'); });
  el.classList.add('active');
}

// ─────────────────────────────────────────
// セット選択画面
// ─────────────────────────────────────────
function renderSetList() {
  // 今日の復習エリア
  var dueArea = document.getElementById('due-area');
  var dueCards = getDueCards();
  var totalDue = dueCards.length;

  if (totalDue > 0) {
    dueArea.innerHTML =
      '<div class="due-btn" onclick="startDueMode()">' +
        '<div class="due-title">📅 今日の復習</div>' +
        '<div class="due-count-badge">' + totalDue + '枚</div>' +
      '</div>';
    document.getElementById('select-greeting').textContent = '今日は' + totalDue + '枚復習しよう！📚';
  } else {
    dueArea.innerHTML =
      '<div class="due-btn no-due">' +
        '<div class="due-title">✅ 今日の復習はなし！</div>' +
      '</div>';
    document.getElementById('select-greeting').textContent = 'よくできてるね！🌸';
  }

  // セット一覧
  var list = document.getElementById('set-list');
  list.innerHTML = '';
  CARD_SETS.forEach(function(set, i) {
    var due = countDueForSet(i);
    var dueBadge = due > 0 ? '<span class="due-badge">' + due + '</span>' : '';
    var badge = set.isReview ? '⚠️ 復習' : '📖 通常';
    var div = document.createElement('div');
    div.className = 'set-item' + (set.isReview ? ' review-set' : '');
    div.innerHTML =
      '<div>' +
        '<div class="name">' + set.name + dueBadge + '</div>' +
        '<div class="meta">' + badge + '　' + set.cards.length + '問</div>' +
      '</div>' +
      '<div class="arrow">▶</div>';
    div.onclick = (function(idx) { return function() { startSet(idx); }; })(i);
    list.appendChild(div);
  });
}

// ─────────────────────────────────────────
// 今日の復習モード（全セット横断）
// ─────────────────────────────────────────
function startDueMode() {
  var dueCards = getDueCards();
  if (dueCards.length === 0) return;

  currentSetIndex = -1;
  document.getElementById('current-set-name').textContent = '今日の復習';
  totalCards = dueCards.length;
  done = 0;

  var shuffled = shuffle(dueCards.slice());
  deck    = shuffled.map(function(d) { return d.card; });
  deckIds = shuffled.map(function(d) { return d.id; });

  showScreen($quiz);
  showCard();
}

// ─────────────────────────────────────────
// セット開始
// ─────────────────────────────────────────
function startSet(idx) {
  currentSetIndex = idx;
  var set = CARD_SETS[idx];
  document.getElementById('current-set-name').textContent = set.name;
  totalCards = set.cards.length;
  done = 0;

  // シャッフル（インデックスを経由してIDも並べ替える）
  var indices = set.cards.map(function(_, ci) { return ci; });
  shuffle(indices);
  deck    = indices.map(function(ci) { return set.cards[ci]; });
  deckIds = indices.map(function(ci) { return cardId(idx, ci); });

  showScreen($quiz);
  showCard();
}

function retrySet() {
  if (currentSetIndex >= 0) startSet(currentSetIndex);
  else startDueMode();
}
function goHome() { renderSetList(); showScreen($select); }

// ─────────────────────────────────────────
// カード表示
// ─────────────────────────────────────────
function showCard() {
  if (deck.length === 0) {
    document.getElementById('complete-phrase').textContent = randPhrase('complete');
    document.getElementById('complete-msg').textContent = totalCards + '問すべて覚えました！';
    showScreen($complete);
    return;
  }

  isFlipped = false;
  var card = document.getElementById('card');
  var wasFlipped = card.classList.contains('flipped');

  var c = deck[0];
  document.getElementById('front-sentence').innerHTML =
    c.sentence.replace('____', '<span class="blank">&nbsp;</span>');
  document.getElementById('front-reading').textContent = c.reading;
  document.getElementById('next-due-label').style.display = 'none';

  document.getElementById('btn-flip-row').style.display = 'flex';
  document.getElementById('btn-judge-row').style.display = 'none';
  updateProgress();
  setPhrase('question');

  function setBackContent() {
    document.getElementById('back-answer').textContent = c.answer;
    document.getElementById('back-reading').textContent = c.reading;
    document.getElementById('back-sentence').textContent = c.sentence.replace('____', c.answer);
    // 現在のスケジュール状態を表示（次回復習日）
    var st = loadState(deckIds[0]);
    if (st && st.interval > 0) {
      var label = document.getElementById('next-due-label');
      label.textContent = intervalLabel(st.interval);
      label.style.display = 'inline-block';
    }
  }

  if (wasFlipped) {
    card.addEventListener('transitionend', function handler() {
      card.removeEventListener('transitionend', handler);
      setBackContent();
    });
    card.classList.remove('flipped');
  } else {
    card.classList.remove('flipped');
    setBackContent();
  }
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('btn-flip-row').style.display = 'none';
  document.getElementById('btn-judge-row').style.display = 'flex';
  setPhrase('answer');
}

// ─────────────────────────────────────────
// 答え合わせ & SM-2更新
// ─────────────────────────────────────────
function judgeCard(ok) {
  // SM-2でカード状態を更新して保存
  var id = deckIds[0];
  var newState = sm2Update(loadState(id), ok);
  saveState(id, newState);

  // 次回復習日を吹き出しに表示
  var bubble = document.getElementById('char-bubble');
  bubble.textContent = ok
    ? randPhrase('ok') + '　' + intervalLabel(newState.interval)
    : randPhrase('again') + '　' + intervalLabel(newState.interval);

  // next-due-labelを即時更新
  var label = document.getElementById('next-due-label');
  label.textContent = intervalLabel(newState.interval);
  label.style.display = 'inline-block';

  var current = deck.shift();
  deckIds.shift();

  if (ok) {
    done++;
  } else {
    var insertAt = Math.min(2, deck.length);
    deck.splice(insertAt, 0, current);
    deckIds.splice(insertAt, 0, id);
  }

  setTimeout(showCard, 700);
}

// ─────────────────────────────────────────
// ユーティリティ
// ─────────────────────────────────────────
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function updateProgress() {
  document.getElementById('progress-num').textContent = done;
  document.getElementById('progress-total').textContent = totalCards;
  var pct = totalCards > 0 ? (done / totalCards) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ─────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────
renderSetList();
</script>
