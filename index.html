<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SAPIX 漢字フラッシュカード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: #FDF8F0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 20px;
    color: #4A3728;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .header .set-name {
    font-size: 14px;
    color: #8B7355;
    margin-bottom: 10px;
  }

  /* ── Progress ── */
  .progress-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }
  .progress-text {
    font-size: 13px;
    color: #8B7355;
    text-align: right;
    margin-bottom: 4px;
  }
  .progress-bar {
    width: 100%;
    height: 8px;
    background: #E8DFD3;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7CB342, #558B2F);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* ── Card ── */
  .card-container {
    width: 100%;
    max-width: 480px;
    perspective: 800px;
    margin-bottom: 20px;
  }
  .card {
    width: 100%;
    min-height: 260px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 2px 12px rgba(74,55,40,0.10), 0 1px 3px rgba(74,55,40,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
  }
  .card-front .sentence {
    font-size: 20px;
    line-height: 1.7;
    color: #3E2C1C;
    text-align: center;
    margin-bottom: 18px;
  }
  .card-front .sentence .blank {
    display: inline-block;
    border-bottom: 3px solid #C2956B;
    min-width: 3em;
    margin: 0 2px;
    vertical-align: baseline;
  }
  .card-front .reading {
    font-size: 22px;
    color: #C2956B;
    font-weight: 600;
    background: #FFF7ED;
    padding: 6px 20px;
    border-radius: 20px;
  }
  .card-front .hint-label {
    font-size: 12px;
    color: #BBA88E;
    margin-top: 16px;
  }

  .card-back {
    transform: rotateY(180deg);
  }
  .card-back .answer {
    font-size: 56px;
    font-weight: 700;
    color: #3E2C1C;
    margin-bottom: 6px;
  }
  .card-back .reading-small {
    font-size: 16px;
    color: #8B7355;
    margin-bottom: 4px;
  }
  .card-back .sentence-small {
    font-size: 14px;
    color: #A89580;
    text-align: center;
    line-height: 1.6;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 14px;
    width: 100%;
    max-width: 480px;
  }
  .btn {
    flex: 1;
    min-height: 52px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn:active { transform: scale(0.96); }
  .btn-again {
    background: #FFEBEE;
    color: #C62828;
    box-shadow: 0 2px 6px rgba(198,40,40,0.12);
  }
  .btn-ok {
    background: #E8F5E9;
    color: #2E7D32;
    box-shadow: 0 2px 6px rgba(46,125,50,0.12);
  }
  .btn-flip {
    background: #FFF3E0;
    color: #E65100;
    box-shadow: 0 2px 6px rgba(230,81,0,0.12);
  }

  /* ── Set Selection ── */
  .screen { display: none; width: 100%; max-width: 480px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  .set-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }
  .set-item {
    width: 100%;
    padding: 16px 20px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 1px 6px rgba(74,55,40,0.08);
    cursor: pointer;
    transition: transform 0.1s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .set-item:active { transform: scale(0.98); }
  .set-item .name { font-size: 16px; color: #3E2C1C; font-weight: 600; }
  .set-item .count { font-size: 13px; color: #8B7355; }
  .set-item .arrow { font-size: 18px; color: #C2956B; }

  /* ── Complete ── */
  .complete-screen {
    text-align: center;
    padding-top: 40px;
  }
  .complete-screen .emoji { font-size: 64px; margin-bottom: 16px; }
  .complete-screen h2 { font-size: 26px; color: #2E7D32; margin-bottom: 8px; }
  .complete-screen p { font-size: 15px; color: #8B7355; margin-bottom: 24px; }
  .btn-back {
    background: #FFF3E0;
    color: #E65100;
    padding: 14px 36px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-retry {
    background: #E8F5E9;
    color: #2E7D32;
    padding: 14px 36px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-right: 10px;
  }
</style>
</head>
<body>

<!-- ===== Set Selection Screen ===== -->
<div id="select-screen" class="screen active">
  <div class="header">
    <h1>SAPIX 漢字フラッシュカード</h1>
    <p class="set-name" style="color:#A89580;">セットを選んでね</p>
  </div>
  <div id="set-list" class="set-list"></div>
</div>

<!-- ===== Quiz Screen ===== -->
<div id="quiz-screen" class="screen">
  <div class="header">
    <h1>SAPIX 漢字フラッシュカード</h1>
    <p id="current-set-name" class="set-name"></p>
  </div>
  <div class="progress-wrap">
    <div class="progress-text"><span id="progress-num">0</span> / <span id="progress-total">0</span></div>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="card-container">
    <div id="card" class="card" onclick="flipCard()">
      <div class="card-face card-front">
        <div id="front-sentence" class="sentence"></div>
        <div id="front-reading" class="reading"></div>
        <div class="hint-label">タップでこたえを見る</div>
      </div>
      <div class="card-face card-back">
        <div id="back-answer" class="answer"></div>
        <div id="back-reading" class="reading-small"></div>
        <div id="back-sentence" class="sentence-small"></div>
      </div>
    </div>
  </div>
  <div id="btn-flip-row" class="btn-row">
    <button class="btn btn-flip" onclick="flipCard()">タップでこたえを見る</button>
  </div>
  <div id="btn-judge-row" class="btn-row" style="display:none;">
    <button class="btn btn-again" onclick="judgeCard(false)">もう一回</button>
    <button class="btn btn-ok" onclick="judgeCard(true)">覚えた！</button>
  </div>
</div>

<!-- ===== Complete Screen ===== -->
<div id="complete-screen" class="screen complete-screen">
  <div class="emoji">🎉</div>
  <h2>全問クリア！</h2>
  <p id="complete-msg"></p>
  <div>
    <button class="btn-retry" onclick="retrySet()">もう一回やる</button>
    <button class="btn-back" onclick="goHome()">セット選択に戻る</button>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  カードデータ — 新しい週はここにオブジェクトを追加  ║
// ╚══════════════════════════════════════════════════════╝
const CARD_SETS = [
  {
    name: "2026年4月 第3週",
    cards: [
      { sentence: "____をもって最後までやりとげる", reading: "せきにん", answer: "責任" },
      { sentence: "家の庭に大きな____がある", reading: "いし", answer: "石" },
      { sentence: "テニスの____で優勝をめざす", reading: "たいかい", answer: "大会" },
      { sentence: "____の国々の文化を学ぶ", reading: "せかい", answer: "世界" },
      { sentence: "博物館で恐竜の____を見た", reading: "かせき", answer: "化石" },
      { sentence: "____を計画的にすごす", reading: "いっしゅうかん", answer: "一週間" },
      { sentence: "バットでボールを力強く____", reading: "うつ", answer: "打つ" },
      { sentence: "コップに____を入れて飲み物を冷やす", reading: "こおり", answer: "氷" },
      { sentence: "____歩道で道路を安全にわたる", reading: "おうだん", answer: "横断" },
      { sentence: "明日の天気を____する", reading: "よそう", answer: "予想" },
      { sentence: "友だちとの____を守る", reading: "やくそく", answer: "約束" },
      { sentence: "新学期が始まって気持ちを____にする", reading: "あらた", answer: "新た" }
    ]
  }
];

// ── State ──
var currentSetIndex = -1;
var deck = [];        // cards still in play
var done = 0;         // cards cleared
var totalCards = 0;
var isFlipped = false;

// ── Screens ──
var $select   = document.getElementById('select-screen');
var $quiz     = document.getElementById('quiz-screen');
var $complete  = document.getElementById('complete-screen');

function showScreen(el) {
  [$select, $quiz, $complete].forEach(function(s) { s.classList.remove('active'); });
  el.classList.add('active');
}

// ── Set Selection ──
function renderSetList() {
  var list = document.getElementById('set-list');
  list.innerHTML = '';
  CARD_SETS.forEach(function(set, i) {
    var div = document.createElement('div');
    div.className = 'set-item';
    div.innerHTML =
      '<div>' +
        '<div class="name">' + set.name + '</div>' +
        '<div class="count">' + set.cards.length + '問</div>' +
      '</div>' +
      '<div class="arrow">▶</div>';
    div.onclick = (function(idx) { return function() { startSet(idx); }; })(i);
    list.appendChild(div);
  });
}

// ── Shuffle (Fisher-Yates) ──
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

// ── Start a Set ──
function startSet(idx) {
  currentSetIndex = idx;
  var set = CARD_SETS[idx];
  document.getElementById('current-set-name').textContent = set.name;
  totalCards = set.cards.length;
  done = 0;
  deck = shuffle(set.cards.slice());
  showScreen($quiz);
  showCard();
}

function retrySet() {
  startSet(currentSetIndex);
}

function goHome() {
  showScreen($select);
}

// ── Card Display ──
function showCard() {
  if (deck.length === 0) {
    showScreen($complete);
    document.getElementById('complete-msg').textContent =
      totalCards + '問すべて覚えました！';
    return;
  }
  isFlipped = false;
  var card = document.getElementById('card');
  var wasFlipped = card.classList.contains('flipped');

  var c = deck[0];
  // Front: sentence with blank（表面は即更新OK）
  document.getElementById('front-sentence').innerHTML =
    c.sentence.replace('____', '<span class="blank">&nbsp;</span>');
  document.getElementById('front-reading').textContent = c.reading;

  document.getElementById('btn-flip-row').style.display = 'flex';
  document.getElementById('btn-judge-row').style.display = 'none';

  updateProgress();

  function setBackContent() {
    document.getElementById('back-answer').textContent = c.answer;
    document.getElementById('back-reading').textContent = c.reading;
    document.getElementById('back-sentence').textContent =
      c.sentence.replace('____', c.answer);
  }

  if (wasFlipped) {
    // アニメーション完了後に裏面を更新して「一瞬見え」を防ぐ
    card.addEventListener('transitionend', function handler() {
      card.removeEventListener('transitionend', handler);
      setBackContent();
    });
    card.classList.remove('flipped');
  } else {
    card.classList.remove('flipped');
    setBackContent();
  }
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('btn-flip-row').style.display = 'none';
  document.getElementById('btn-judge-row').style.display = 'flex';
}

function judgeCard(ok) {
  var current = deck.shift();
  if (ok) {
    done++;
  } else {
    // Insert 2 cards later (or at end if deck is short)
    var insertAt = Math.min(2, deck.length);
    deck.splice(insertAt, 0, current);
  }
  showCard();
}

function updateProgress() {
  document.getElementById('progress-num').textContent = done;
  document.getElementById('progress-total').textContent = totalCards;
  var pct = totalCards > 0 ? (done / totalCards) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Init ──
renderSetList();

// If only one set, skip selection and go straight to quiz
if (CARD_SETS.length === 1) {
  startSet(0);
}
</script>
</body>
</html>
