<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SAPIX フラッシュカード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: #FDF8F0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    user-select: none;
    -webkit-user-select: none;
  }

  h1 {
    font-size: 22px;
    color: #4A3728;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #A89580;
    text-align: center;
    margin-bottom: 24px;
  }

  /* キャラクター */
  .char-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .char-wrap svg { margin-bottom: 12px; }
  .char-bubble {
    background: white;
    border-radius: 20px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    color: #4A3728;
    box-shadow: 0 2px 10px rgba(74,55,40,0.12);
  }

  /* 科目グリッド */
  .subject-grid {
    width: 100%;
    max-width: 480px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .subject-card {
    background: white;
    border-radius: 18px;
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 10px rgba(74,55,40,0.09);
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.12s, box-shadow 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .subject-card:active { transform: scale(0.96); box-shadow: 0 1px 4px rgba(74,55,40,0.09); }
  .subject-icon { font-size: 36px; line-height: 1; }
  .subject-name {
    font-size: 18px;
    font-weight: 700;
    color: #3E2C1C;
  }
  .subject-count {
    font-size: 12px;
    color: #A89580;
  }

  /* 科目ごとの色 */
  .subj-kokugo  { border-top: 4px solid #F06292; }
  .subj-sansu   { border-top: 4px solid #42A5F5; }
  .subj-rika    { border-top: 4px solid #66BB6A; }
  .subj-shakai  { border-top: 4px solid #FFA726; }

  /* 準備中カード */
  .subject-card.coming-soon { opacity: 0.45; cursor: default; pointer-events: none; }
  .coming-label {
    font-size: 11px;
    color: #A89580;
    background: #F5EDE3;
    border-radius: 8px;
    padding: 2px 8px;
  }
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="hana-chan" viewBox="0 0 80 96">
    <!-- 左耳 -->
    <ellipse cx="16" cy="27" rx="13" ry="27" fill="#C4733A"/>
    <ellipse cx="16" cy="29" rx="8"  ry="20" fill="#9A4858"/>
    <!-- 右耳 -->
    <ellipse cx="64" cy="27" rx="13" ry="27" fill="#C4733A"/>
    <ellipse cx="64" cy="29" rx="8"  ry="20" fill="#9A4858"/>
    <!-- 体・顔 -->
    <circle cx="40" cy="66" r="27" fill="#D4874A"/>
    <ellipse cx="40" cy="72" rx="15" ry="17" fill="#E09A5A" opacity="0.4"/>
    <!-- 左目 -->
    <circle cx="28" cy="60" r="10"  fill="white"/>
    <circle cx="28" cy="61" r="6.5" fill="#A8B4BE"/>
    <circle cx="28" cy="62" r="3.8" fill="#1E1008"/>
    <circle cx="25.5" cy="59" r="1.5" fill="white"/>
    <!-- 右目 -->
    <circle cx="52" cy="60" r="10"  fill="white"/>
    <circle cx="52" cy="61" r="6.5" fill="#A8B4BE"/>
    <circle cx="52" cy="62" r="3.8" fill="#1E1008"/>
    <circle cx="49.5" cy="59" r="1.5" fill="white"/>
    <!-- まつげ左（くるくる） -->
    <path d="M19 51 C21 47 24 47 23 51" stroke="#1E1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M24 50 C26 46 29 46 28 50" stroke="#1E1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M29 50 C31 47 34 48 33 51" stroke="#1E1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- まつげ右（くるくる） -->
    <path d="M43 51 C45 47 48 47 47 51" stroke="#1E1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M48 50 C50 46 53 46 52 50" stroke="#1E1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M53 50 C55 47 58 48 57 51" stroke="#1E1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- ほっぺ -->
    <circle cx="17" cy="68" r="7" fill="#D06030" opacity="0.3"/>
    <circle cx="63" cy="68" r="7" fill="#D06030" opacity="0.3"/>
    <!-- 鼻 -->
    <ellipse cx="40" cy="70" rx="3.5" ry="2.8" fill="#1E1008"/>
    <!-- 口（笑顔・開口） -->
    <path d="M32 76 Q40 85 48 76" fill="#F08080" stroke="#1E1008" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M34 77 Q40 82 46 77" fill="white" stroke="none"/>
    <!-- しっぽ（前面） -->
    <ellipse cx="40" cy="91" rx="30" ry="8"   fill="#C4733A"/>
    <ellipse cx="40" cy="90" rx="22" ry="5.5" fill="#D4874A"/>
  </symbol>
</svg>

<h1>SAPIX フラッシュカード</h1>
<p class="subtitle">科目を選んでね</p>

<div class="char-wrap">
  <svg viewBox="0 0 80 96" width="88" height="106"><use href="#hana-chan"/></svg>
  <div class="char-bubble">どの科目にする？🌸</div>
</div>

<div class="subject-grid">
  <a class="subject-card subj-kokugo" href="./kokugo/">
    <div class="subject-icon">📖</div>
    <div class="subject-name">国語</div>
    <div class="subject-count">漢字フラッシュカード</div>
  </a>
  <a class="subject-card subj-sansu" href="./sansu/">
    <div class="subject-icon">🔢</div>
    <div class="subject-name">算数</div>
    <div class="subject-count">計算フラッシュカード</div>
  </a>
  <div class="subject-card subj-rika coming-soon">
    <div class="subject-icon">🔬</div>
    <div class="subject-name">理科</div>
    <div class="coming-label">準備中</div>
  </div>
  <div class="subject-card subj-shakai coming-soon">
    <div class="subject-icon">🗾</div>
    <div class="subject-name">社会</div>
    <div class="coming-label">準備中</div>
  </div>
</div>

</body>
</html>
