<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SAPIX フラッシュカード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: #FDF8F0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    user-select: none;
    -webkit-user-select: none;
  }

  h1 {
    font-size: 22px;
    color: #4A3728;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #A89580;
    text-align: center;
    margin-bottom: 24px;
  }

  /* キャラクター */
  .char-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .char-wrap svg { margin-bottom: 12px; }
  .char-bubble {
    background: white;
    border-radius: 20px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    color: #4A3728;
    box-shadow: 0 2px 10px rgba(74,55,40,0.12);
  }

  /* 科目グリッド */
  .subject-grid {
    width: 100%;
    max-width: 480px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .subject-card {
    background: white;
    border-radius: 18px;
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 10px rgba(74,55,40,0.09);
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.12s, box-shadow 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .subject-card:active { transform: scale(0.96); box-shadow: 0 1px 4px rgba(74,55,40,0.09); }
  .subject-icon { font-size: 36px; line-height: 1; }
  .subject-name {
    font-size: 18px;
    font-weight: 700;
    color: #3E2C1C;
  }
  .subject-count {
    font-size: 12px;
    color: #A89580;
  }

  /* 科目ごとの色 */
  .subj-kokugo  { border-top: 4px solid #F06292; }
  .subj-sansu   { border-top: 4px solid #42A5F5; }
  .subj-rika    { border-top: 4px solid #66BB6A; }
  .subj-shakai  { border-top: 4px solid #FFA726; }

  /* 準備中カード */
  .subject-card.coming-soon { opacity: 0.45; cursor: default; pointer-events: none; }
  .coming-label {
    font-size: 11px;
    color: #A89580;
    background: #F5EDE3;
    border-radius: 8px;
    padding: 2px 8px;
  }
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="hana-chan" viewBox="0 0 80 96">
    <ellipse cx="22" cy="26" rx="12" ry="28" fill="white" stroke="#DDBBD0" stroke-width="2"/>
    <ellipse cx="22" cy="26" rx="7" ry="21" fill="#FFB3D0"/>
    <ellipse cx="58" cy="26" rx="12" ry="28" fill="white" stroke="#DDBBD0" stroke-width="2"/>
    <ellipse cx="58" cy="26" rx="7" ry="21" fill="#FFB3D0"/>
    <circle cx="40" cy="65" r="30" fill="white" stroke="#DDBBD0" stroke-width="2"/>
    <circle cx="28" cy="59" r="8" fill="#F48FB1"/>
    <circle cx="28" cy="58" r="5" fill="white"/>
    <circle cx="29" cy="57" r="2.5" fill="#3E2C1C"/>
    <circle cx="30" cy="56" r="1" fill="white"/>
    <circle cx="52" cy="59" r="8" fill="#F48FB1"/>
    <circle cx="52" cy="58" r="5" fill="white"/>
    <circle cx="53" cy="57" r="2.5" fill="#3E2C1C"/>
    <circle cx="54" cy="56" r="1" fill="white"/>
    <circle cx="17" cy="68" r="8" fill="#FFB3D0" opacity="0.65"/>
    <circle cx="63" cy="68" r="8" fill="#FFB3D0" opacity="0.65"/>
    <ellipse cx="40" cy="68" rx="5" ry="3.5" fill="#F48FB1"/>
    <path d="M34 74 Q40 80 46 74" stroke="#C06080" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M40 68 L40 74" stroke="#C06080" stroke-width="1.5" fill="none"/>
  </symbol>
</svg>

<h1>SAPIX フラッシュカード</h1>
<p class="subtitle">科目を選んでね</p>

<div class="char-wrap">
  <svg viewBox="0 0 80 96" width="88" height="106"><use href="#hana-chan"/></svg>
  <div class="char-bubble">どの科目にする？🌸</div>
</div>

<div class="subject-grid">
  <a class="subject-card subj-kokugo" href="./kokugo/">
    <div class="subject-icon">📖</div>
    <div class="subject-name">国語</div>
    <div class="subject-count">漢字フラッシュカード</div>
  </a>
  <div class="subject-card subj-sansu coming-soon">
    <div class="subject-icon">🔢</div>
    <div class="subject-name">算数</div>
    <div class="coming-label">準備中</div>
  </div>
  <div class="subject-card subj-rika coming-soon">
    <div class="subject-icon">🔬</div>
    <div class="subject-name">理科</div>
    <div class="coming-label">準備中</div>
  </div>
  <div class="subject-card subj-shakai coming-soon">
    <div class="subject-icon">🗾</div>
    <div class="subject-name">社会</div>
    <div class="coming-label">準備中</div>
  </div>
</div>

</body>
</html>
